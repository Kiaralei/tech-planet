<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1080" viewBox="0 0 960 1080" role="img" aria-labelledby="title desc">
  <title id="title">微信小程序逻辑层运行模型</title>
  <desc id="desc">微信 Native App 创建 JS Runtime，注入 JSBridge，加载微信基础库，再执行开发者小程序 JS，最后通过 Native 与渲染层通信。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5a6"/>
      <stop offset=".52" stop-color="#ffd2e8"/>
      <stop offset="1" stop-color="#b9f8ff"/>
    </linearGradient>
    <linearGradient id="native" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7ab6"/>
      <stop offset="1" stop-color="#ffcf5c"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edfff8"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbf4ff"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ff9c"/>
      <stop offset="1" stop-color="#baf8ff"/>
    </linearGradient>
    <linearGradient id="biz" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe2f1"/>
    </linearGradient>
    <filter id="shadow" x="-14%" y="-14%" width="128%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#4b3b63" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L11 7 L2 12 Z" fill="#514565"/>
    </marker>
  </defs>

  <rect width="960" height="1080" rx="42" fill="url(#bg)"/>
  <circle cx="126" cy="156" r="84" fill="#ff6fae" opacity=".18"/>
  <circle cx="824" cy="160" r="104" fill="#40e2d0" opacity=".22"/>
  <circle cx="790" cy="934" r="132" fill="#8a7cff" opacity=".13"/>

  <g font-family="Inter, 'Microsoft YaHei', sans-serif">
    <text x="72" y="80" fill="#2b2538" font-size="34" font-weight="850">微信小程序逻辑层运行模型</text>
    <text x="74" y="118" fill="#625875" font-size="17">重点：没有 DOM 也能通信，因为桥是 Native 注入到 JS Runtime 的能力。</text>

    <g filter="url(#shadow)">
      <rect x="96" y="168" width="768" height="104" rx="28" fill="url(#native)"/>
      <text x="136" y="214" fill="#fff" font-size="25" font-weight="850">微信 Native App</text>
      <text x="136" y="248" fill="#fff" font-size="17">创建 JS Runtime、注入桥、调度生命周期、调用系统能力</text>
    </g>

    <path d="M480 286 V328" stroke="#514565" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="506" y="315" fill="#514565" font-size="16" font-weight="800">创建 / 注入</text>

    <g filter="url(#shadow)">
      <rect x="96" y="342" width="768" height="520" rx="34" fill="url(#runtime)"/>
      <text x="136" y="396" fill="#2b2538" font-size="27" font-weight="850">逻辑层 JS Runtime</text>
      <text x="138" y="428" fill="#625875" font-size="16">这里不是浏览器页面，所以没有 document，也不依赖 DOM 事件通信。</text>

      <rect x="146" y="468" width="668" height="78" rx="22" fill="url(#bridge)"/>
      <text x="180" y="502" fill="#2b2538" font-size="22" font-weight="800">1. WeixinJSBridge</text>
      <text x="180" y="530" fill="#625875" font-size="16">Native 注入的通信入口：JS 发消息，Native 回传结果</text>

      <path d="M480 558 V588" stroke="#514565" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

      <rect x="146" y="602" width="668" height="78" rx="22" fill="url(#base)"/>
      <text x="180" y="636" fill="#2b2538" font-size="22" font-weight="800">2. 微信基础库</text>
      <text x="180" y="664" fill="#625875" font-size="16">提供 App / Page / Component / wx / setData 等运行时 API</text>

      <path d="M480 692 V722" stroke="#514565" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

      <rect x="146" y="736" width="668" height="78" rx="22" fill="url(#biz)"/>
      <text x="180" y="770" fill="#2b2538" font-size="22" font-weight="800">3. 开发者小程序 JS</text>
      <text x="180" y="798" fill="#625875" font-size="16">调用基础库 API，注册 App / Page，编写业务逻辑</text>
    </g>

    <path d="M480 830 C480 904 610 912 670 912" fill="none" stroke="#ff6fae" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 15" marker-end="url(#arrow)"/>
    <text x="226" y="926" fill="#7c315e" font-size="17" font-weight="850">调用 wx API / setData / 事件通信</text>

    <g filter="url(#shadow)">
      <rect x="672" y="866" width="192" height="88" rx="25" fill="#ffffff" opacity=".94"/>
      <text x="708" y="902" fill="#2b2538" font-size="22" font-weight="850">渲染层</text>
      <text x="708" y="930" fill="#625875" font-size="16">WebView 展示页面</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="96" y="936" width="520" height="82" rx="24" fill="#ffffff" opacity=".88"/>
      <text x="126" y="966" fill="#2b2538" font-size="18" font-weight="850">记忆点</text>
      <text x="126" y="992" fill="#625875" font-size="15">基础库和业务代码同在 Runtime，</text>
      <text x="126" y="1014" fill="#625875" font-size="15">但基础库先加载，先把小程序运行框架搭好。</text>
    </g>
  </g>
</svg>
